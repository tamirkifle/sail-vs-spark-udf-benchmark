# GPU Smoke Test — exercise every code path with minimal GPU time.
# Goal: catch regressions before committing to a full H200 run.
#
# Usage:
#   CONFIG=config/gpu_v100_smoke.yaml bash scripts/run_all_gpu.sh
#
# What "minimal" means here:
#   - 10 rows, 2 partitions  → each partition gets 5 rows; verifies partitioning
#   - W0 depth 1 only        → one chained-UDF pass, not three
#   - W1/W4 n_candidates=1   → single generate+score per prompt
#   - W4 max_iterations=1    → one agentic loop iteration, no retry path
#   - W3 n_queries=3         → 3 reference embeddings, enough for similarity check
#   - max_new_tokens=16      → short generation; verifies output path, not throughput
#   - max_model_len=512      → small KV cache; faster vLLM startup
#   - runner.iterations=1    → run each (workload, config) once, not 3×

profile: gpu_v100_smoke
hardware:
  device: cuda
  num_partitions: 2

dataset:
  source: synthetic
  n_rows: 10
  out_dir: data/gpu_smoke

models:
  generator:
    name: geonmin-kim/Qwen3-MoE-1.2B-A0.6B-FP8
    max_new_tokens: 16
    temperature: 0.7
    top_k: 50
    top_p: 0.9
    server_url: ""
    allow_mock: false
  scorer:
    name: OpenAssistant/reward-model-deberta-v3-large-v2
    allow_mock: false
  embedder:
    name: sentence-transformers/all-MiniLM-L6-v2
    allow_mock: false

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 512
  quantization: fp8
  port: 8000
  host: "127.0.0.1"
  # geonmin-kim FP8 upload is missing all tokenizer files (broken upload).
  # Qwen2.5 shares the same tiktoken base vocab as Qwen3; safe for non-thinking use.
  tokenizer: "Qwen/Qwen2.5-7B-Instruct"

workloads:
  w0_chained:
    depths: [1]
    batch_size: 10
  w1_best_of_n:
    n_candidates: 1
    batch_size: 4
  w2_batched:
    batch_size: 4
  w3_embedding:
    batch_size: 10
    n_queries: 3
  w4_agentic:
    max_iterations: 1
    reward_threshold: 0.5
    n_candidates: 1
    batch_size: 4

runner:
  sail_remote_url: "sc://localhost:50051"
  sample_interval_sec: 0.5
  results_dir: results/gpu_smoke
  iterations: 1
