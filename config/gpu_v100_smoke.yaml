# V100 Smoke Test — Verify GPU code path without H200 wait times.
# 100 rows, tiny models, FP16.

profile: gpu_v100_smoke
hardware:
  device: cuda
  num_partitions: 2

dataset:
  source: synthetic            # Use synthetic for faster verification
  n_rows: 100
  out_dir: data/gpu_smoke

models:
  # Generator served by vLLM. MoE + FP8 architecture verifies the code path
  # without needing H200 wait times. vLLM handles FP8 internally.
  generator:
    name: geonmin-kim/Qwen3-MoE-1.2B-A0.6B-FP8
    max_new_tokens: 32
    temperature: 0.7
    top_k: 50
    top_p: 0.9
    # server_url: set via VLLM_BASE_URL env var by start_vllm_server.sh
    server_url: ""
    allow_mock: false
  scorer:
    name: OpenAssistant/reward-model-deberta-v3-large-v2
    allow_mock: false
  embedder:
    name: sentence-transformers/all-MiniLM-L6-v2
    allow_mock: false

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.85
  max_model_len: 4096
  quantization: fp8
  port: 8000
  host: "127.0.0.1"

workloads:
  w0_chained:
    depths: [1]
    batch_size: 32
  w1_best_of_n:
    n_candidates: 2
    batch_size: 8
  w2_batched:
    batch_size: 8
  w3_embedding:
    batch_size: 32
    n_queries: 10
  w4_agentic:
    max_iterations: 2
    reward_threshold: 0.5
    n_candidates: 2
    batch_size: 8

runner:
  sail_remote_url: "sc://localhost:50051"
  sample_interval_sec: 0.5
  results_dir: results/gpu_smoke
