# H200 141GB — full benchmark tier.
# Real numbers: 10K rows, FP8 large models, all 4 configs × 4 workloads.

profile: gpu_h200
hardware:
  device: cuda
  num_partitions: 4            # one partition per ~25% of workload
  gpu_mem_headroom_gb: 15      # keep >=15GB free for KV cache + overheads

dataset:
  source: openbmb/UltraFeedback
  split: train
  n_rows: 1500
  columns:
    prompt_id: int
    prompt_text: string
  out_dir: data/gpu

models:
  # Generator served by vLLM (start_vllm_server.sh). vLLM handles FP8
  # quantization internally — no finegrained-fp8/causal-conv1d kernels needed.
  generator:
    name: Qwen/Qwen3.6-27B-FP8
    max_new_tokens: 128
    temperature: 0.7
    top_k: 50
    top_p: 0.9
    # server_url: set via VLLM_BASE_URL env var by start_vllm_server.sh
    server_url: ""
    allow_mock: false
  scorer:
    name: OpenAssistant/reward-model-deberta-v3-large-v2
    allow_mock: false
  embedder:
    name: BAAI/bge-large-en-v1.5
    allow_mock: false

vllm:
  tensor_parallel_size: 1
  gpu_memory_utilization: 0.75  # 27B FP8 ≈ 27 GiB; leaves ~36 GiB free for scorer/embedder/workers
  max_model_len: 4096
  quantization: fp8
  port: 8000
  host: "127.0.0.1"

workloads:
  w0_chained:
    depths: [1, 2, 3]
    batch_size: 1024
  w1_best_of_n:
    n_candidates: 4
    batch_size: 32
  w2_batched:
    batch_size: 32
  w3_embedding:
    batch_size: 256
    n_queries: 50
  w4_agentic:
    max_iterations: 3
    reward_threshold: 0.5
    n_candidates: 2
    batch_size: 16

execution:
  configs: [A, B, C, D]

runner:
  sail_remote_url: "sc://localhost:50051"
  sample_interval_sec: 0.5
  results_dir: results/gpu
  iterations: 1
