# CPU real-model smoke config. Starts vLLM in CPU mode for generation and
# uses local HF/SentenceTransformer model loading for scoring/embedding.

profile: cpu_real
hardware:
  device: cpu
  num_partitions: 2

dataset:
  source: openbmb/UltraFeedback
  split: train
  n_rows: 12
  columns:
    prompt_id: int
    prompt_text: string
  out_dir: data/cpu_real

models:
  generator:
    name: Qwen/Qwen2.5-0.5B-Instruct
    prefer_mock: false
    allow_mock: false
    max_new_tokens: 16
    temperature: 0.7
    top_k: 50
    top_p: 0.9
    server_url: ""
  scorer:
    name: OpenAssistant/reward-model-deberta-v3-large-v2
    prefer_mock: false
    allow_mock: false
    device: cpu
    score_batch_size: 2
    max_length: 256
  embedder:
    name: sentence-transformers/all-MiniLM-L6-v2
    prefer_mock: false
    allow_mock: false
    device: cpu

vllm:
  device: cpu
  host: "127.0.0.1"
  port: 8000
  dtype: bfloat16
  tensor_parallel_size: 1
  max_model_len: 512
  cpu_kvcache_space: 4
  cpu_num_reserved: 1

workloads:
  w0_chained:
    depths: [1]
    batch_size: 12
  w1_best_of_n:
    n_candidates: 1
    batch_size: 2
  w2_batched:
    batch_size: 2
  w3_embedding:
    batch_size: 6
    n_queries: 3
  w4_agentic:
    max_iterations: 1
    reward_threshold: 0.5
    n_candidates: 1
    batch_size: 2

execution:
  configs: [A, B, C, D]

runner:
  sail_remote_url: "sc://localhost:50051"
  sample_interval_sec: 0.5
  results_dir: results/cpu_real
  iterations: 1
