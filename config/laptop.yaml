# Laptop (CPU / Apple Silicon MPS) — smoke tier.
# Proves wiring and measures baseline overhead on a small dataset.

profile: laptop
hardware:
  device: cpu                  # "cpu" | "mps" | "cuda" | "auto"
  num_partitions: 2

dataset:
  source: openbmb/UltraFeedback
  split: train
  n_rows: 100
  columns:
    prompt_id: int
    prompt_text: string
  out_dir: data/laptop

models:
  # Laptop runs prioritize wiring and overhead shape. Real generation now
  # requires vLLM; local smoke uses the deterministic mock generator.
  generator:
    name: Qwen/Qwen2.5-0.5B-Instruct
    max_new_tokens: 32
    temperature: 0.7
    prefer_mock: true
    allow_mock: true
  scorer:
    name: mock-scorer
    prefer_mock: true
    allow_mock: true           # allow fallback when local deps/models are absent
  embedder:
    name: mock-embedder
    prefer_mock: true
    allow_mock: true
    dim: 64

workloads:
  w0_chained:
    depths: [1, 2, 3]
    batch_size: 32
  w1_best_of_n:
    n_candidates: 4
    batch_size: 8
  w2_batched:
    batch_size: 8
  w3_embedding:
    batch_size: 16
    n_queries: 5
  w4_agentic:
    max_iterations: 2
    reward_threshold: 0.5
    n_candidates: 2
    batch_size: 8

execution:
  configs: [A, B, C, D]        # A=spark-row, B=spark-pandas, C=sail-arrow, D=sail-udtf

runner:
  sail_remote_url: "sc://localhost:50051"   # used for Config C/D
  sample_interval_sec: 0.5
  results_dir: results/laptop
