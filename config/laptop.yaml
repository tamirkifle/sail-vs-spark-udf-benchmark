# Laptop (CPU / Apple Silicon MPS) — smoke tier.
# Proves wiring and measures baseline overhead on a small dataset.

profile: laptop
hardware:
  device: auto                 # "cpu" | "mps" | "cuda" | "auto"
  num_partitions: auto         # automatically resolves to SLURM cores or os.cpu_count()

dataset:
  source: openbmb/UltraFeedback
  split: train
  n_rows: 100
  columns:
    prompt_id: int
    prompt_text: string
  out_dir: data/laptop

models:
  # Generator, scorer, embedder selections match what the spec asks for
  # at the Milestone-1 tier. All three are small enough to run on a
  # MacBook CPU or Apple MPS.
  generator:
    name: Qwen/Qwen2.5-0.5B-Instruct
    max_new_tokens: 32
    temperature: 0.7
    allow_mock: true          # enforce real model
  scorer:
    # Small reward model for testing
    name: OpenAssistant/reward-model-deberta-v3-large-v2
    prefer_mock: false         # load real reward model
    allow_mock: true          # enforce real model
  embedder:
    name: sentence-transformers/all-MiniLM-L6-v2
    allow_mock: false          # enforce real model

workloads:
  w0_chained:
    depths: [1, 2, 3]
    batch_size: 32
  w1_best_of_n:
    n_candidates: 4
    batch_size: 8
  w2_batched:
    batch_size: 8
  w3_embedding:
    batch_size: 16
    n_queries: 5
  w4_agentic:
    max_iterations: 2
    reward_threshold: 0.5
    n_candidates: 2
    batch_size: 8

execution:
  configs: [A, B, C, D]        # A=spark-row, B=spark-pandas, C=sail-arrow, D=sail-udtf

runner:
  sail_remote_url: "sc://localhost:50051"   # used for Config C/D
  sample_interval_sec: 0.5
  results_dir: results/laptop
